name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint and test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install the package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,plots]"

      - name: Check formatting (ruff format)
        run: ruff format --check .

      - name: Lint (ruff check)
        run: ruff check --output-format=github .

      - name: Run tests (pytest + coverage)
        run: pytest --cov=galaxydisksize --cov-report=term-missing --cov-fail-under=65
