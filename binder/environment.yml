# Environment used by mybinder.org to provision an interactive session.
# Kept light: it powers the demonstration notebook (notebooks/demo.ipynb), not
# the full LaTeX build. `binder/postBuild` installs the package itself.
name: galaxydisksize-binder
channels:
  - conda-forge
dependencies:
  - python=3.12
  - numpy>=1.24
  - scipy>=1.10
  - pandas>=2.0
  - astropy>=5.3
  - matplotlib>=3.7
  - emcee>=3.1
  - corner>=2.2
  - pyyaml>=6.0
  - jupyterlab>=4.0
  - pip
