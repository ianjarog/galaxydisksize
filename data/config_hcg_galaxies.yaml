# Configuration file for Hickson Compact Groups (HCG) interacting galaxies
# Data sources: Various VLA, WSRT, GMRT observations

# Evolutionary phases of HCG groups
# Phase 1: Early interaction
# Phase 2: Intermediate interaction  
# Phase 3a/3b/3c: Advanced interaction stages
phases:
  HCG2: "1"
  HCG7: "1"
  HCG10: "1"
  HCG15: "3c"
  HCG16: "2"
  HCG19: "1"
  HCG22: "3c"
  HCG23: "1"
  HCG25: "1"
  HCG26: "1"
  HCG30: "3a"
  HCG31: "2"
  HCG33: "3c"
  HCG37: "3a"
  HCG40: "2"
  HCG47: "2"
  HCG56: "3c"
  HCG58: "2"
  HCG59: "1"
  HCG61: "3a"
  HCG62: "3a"
  HCG68: "3c"
  HCG71: "2"
  HCG79: "2"
  HCG88: "1"
  HCG90: "3c"
  HCG91: "2"
  HCG92: "3a"
  HCG93: "3c"
  HCG96: "2"
  HCG97: "3c"
  HCG100: "2"

# HCG member galaxies with HI data cube associations
# Key: parent HI cube filename
# Value: list of member galaxy mask filenames
hcgs_members:
  HCG2_HI.pbcor_vopt.fits:
    - HCG2a_regrided.fits
    - HCG2b_regrided.fits
    - HCG2c_regrided.fits

  HCG7_HI.pbcor_vopt.fits:
    - HCG7a_regrided.fits
    - HCG7c_regrided.fits
    - HCG7d_regrided.fits

  HCG10_HI.pbcor_vopt.fits:
    - HCG10a_regrided.fits
    - HCG10d_regrided.fits

  HCG15_HI.pbcor_vopt.fits:
    - HCG15f_regrided.fits

  HCG16_HI.pbcor_vopt.fits:
    - NGC848_regrided.fits
    - HCG16a_regrided.fits
    - HCG16b_regrided.fits
    - HCG16c_regrided.fits
    - HCG16d_regrided.fits

  HCG19_HI.pbcor_vopt.fits:
    - HCG19b_regrided.fits
    - HCG19c_regrided.fits

  HCG22_HI.pbcor_vopt.fits:
    - HCG22c_regrided.fits

  HCG23_HI.pbcor_vopt.fits:
    # HCG23-26 is a tidal feature between galaxies
    - HCG23-26_regrided.fits
    - HCG23a_regrided.fits
    - HCG23b_regrided.fits
    - HCG23d_regrided.fits

  HCG25_HI.pbcor_vopt.fits:
    - HCG25a_regrided.fits
    - HCG25b_regrided.fits

  HCG26_HI.pbcor_vopt.fits:
    - HCG26a_regrided.fits
    - HCG26e_regrided.fits

  # HCG30: No core members detected in HI

  HCG31_HI.pbcor_vopt.fits:
    - HCG31a_regrided.fits
    - HCG31b_regrided.fits
    - HCG31c_regrided.fits
    - HCG31g_regrided.fits
    - HCG31q_regrided.fits  # No optical diameter but HI is fine

  HCG33_HI.pbcor_vopt.fits:
    - HCG33c_regrided.fits

  # HCG37: No core members detected in HI
  # HCG38: Poor data cubes due to RFI

  HCG40_HI.pbcor_vopt.fits:
    - HCG40c_regrided.fits
    - HCG40d_regrided.fits

  # HCG47: Unreliable data cubes
  # HCG48: False group (HCG48b excluded)
  # HCG49: No reliable separation, poor data quality
  # HCG54: Significant sidelobes, treated as single merger

  HCG56_HI.pbcor_vopt.fits:
    - HCG56a_regrided.fits

  # HCG57: Poor data quality

  HCG58_HI.pbcor_vopt.fits:
    - HCG58a_regrided.fits
    - HCG58e_regrided.fits

  HCG59_HI.pbcor_vopt.fits:
    - HCG59b_regrided.fits
    - HCG59c_regrided.fits
    - HCG59d_regrided.fits

  HCG61_HI.pbcor_vopt.fits:
    - HCG61c_regrided.fits

  # HCG62: Undetected in HI

  HCG68_HI.pbcor_vopt.fits:
    - HCG68c_regrided.fits

  HCG71_HI.pbcor_vopt.fits:
    - AGC242021_regrided.fits
    - AGC732898_regrided.fits
    - HCG71a_regrided.fits
    - HCG71c_regrided.fits

  HCG79_HI.pbcor_vopt.fits:
    - HCG79d_regrided.fits

  HCG88_HI.pbcor_vopt.fits:
    - HCG88a_regrided.fits
    - HCG88b_regrided.fits
    - HCG88c_regrided.fits
    - HCG88d_regrided.fits

  HCG90_HI.pbcor_vopt.fits:
    - HCG90a_regrided.fits

  HCG91_HI.pbcor_vopt.fits:
    - HCG91a_regrided.fits
    - HCG91b_regrided.fits
    - HCG91c_regrided.fits

  # HCG92: Stephan's Quintet - no emission located in galaxies themselves

  HCG93_HI.pbcor_vopt.fits:
    - HCG93b_regrided.fits

  # HCG95: Unreliable separation, too far away

  HCG96_HI.pbcor_vopt.fits:
    - HCG96a_regrided.fits

  # HCG97: No contours found (HCG97b excluded)
  # HCG100: No separation for core, MRK935 too faint

